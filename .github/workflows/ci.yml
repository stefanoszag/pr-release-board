# CI: runs on PRs (every push to PR branch) and on push to default branch (main).
# Push to main uploads coverage so Codecov has a "base commit" for PR comparison.
# Uses same test DB URL as tests/conftest.py (127.0.0.1).

name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_pr_board
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Match tests/conftest.py and Makefile (127.0.0.1 for consistent connectivity)
      DATABASE_URL: postgresql://test:test@127.0.0.1:5432/test_pr_board
      GITHUB_TOKEN: ""  # empty — tests mock PyGitHub

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry and dependencies
        run: pip install poetry && poetry install

      - name: Run migrations
        run: poetry run alembic upgrade head

      - name: Run tests with coverage
        run: poetry run pytest tests/ -v --cov=app --cov-report=xml --cov-report=term --tb=short

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
