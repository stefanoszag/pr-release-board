# Phase 1: app + Postgres. Run: docker-compose up --build
# Then open http://127.0.0.1:5000/ (or http://127.0.0.1:5001/ if 5000 is in use)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prboard
      POSTGRES_PASSWORD: prboard
      POSTGRES_DB: prboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prboard -d prboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_APP: app
      DATABASE_URL: postgresql://prboard:prboard@db:5432/prboard
      GITHUB_TOKEN: ""
      GITHUB_OWNER: ""
      GITHUB_REPO: ""
      DEFAULT_BRANCH: main
      SYNC_INTERVAL_MINUTES: "5"
    ports:
      - "5000:5000"

volumes:
  postgres_data:
