<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PR Release Board{% endblock %}</title>
  <script>
    if (localStorage.getItem('theme') === 'dark' ||
        (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">
  <nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-4 py-3 flex items-center gap-4">
    <a href="/" class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-gray-100">PR Release Board</a>
    <a href="/activity" class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-gray-100">Activity</a>
    <button type="button" id="theme-toggle" class="ml-auto p-2 rounded-md text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500" aria-label="Toggle dark mode">
      <span id="theme-toggle-dark-icon" class="hidden dark:inline" aria-hidden="true">☀</span>
      <span id="theme-toggle-light-icon" class="inline dark:hidden" aria-hidden="true">☽</span>
    </button>
  </nav>
  <main class="container mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      if (btn) {
        btn.addEventListener('click', function () {
          var isDark = document.documentElement.classList.toggle('dark');
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
      }
    })();
  </script>
  {% endblock %}
</body>
</html>
